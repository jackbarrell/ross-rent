services:
  - type: web
    name: ross-rent
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npm run build && cd ../frontend && npm install && npm run build
    startCommand: cd backend && node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
      - key: PORT
        value: "10000"
      - key: USE_MOCK_DATA
        value: "true"
      - key: FRONTEND_ORIGIN
        value: "https://ross-rent.onrender.com"
