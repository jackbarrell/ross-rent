services:
  - type: web
    name: ross-rent
    runtime: node
    plan: free
    buildCommand: node --version && npm --version && npm install --prefix backend && npm run build --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: cd backend && node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
      - key: PORT
        value: "10000"
      - key: USE_MOCK_DATA
        value: "true"
      - key: FRONTEND_ORIGIN
        value: "*"
      - key: NODE_ENV
        value: production
